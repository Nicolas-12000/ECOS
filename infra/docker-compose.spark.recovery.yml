services:
  spark-master:
    image: apache/spark:3.5.8
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    environment:
      SPARK_NO_DAEMONIZE: "true"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ../:/opt/spark/work
    healthcheck:
      test: ["CMD", "bash", "-lc", "jps | grep -q Master"]
      interval: 15s
      timeout: 10s
      retries: 8

  spark-worker:
    image: apache/spark:3.5.8
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - spark://spark-master:7077
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ../:/opt/spark/work
    healthcheck:
      test: ["CMD", "bash", "-lc", "jps | grep -q Worker"]
      interval: 15s
      timeout: 10s
      retries: 8
